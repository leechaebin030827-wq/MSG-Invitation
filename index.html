  <style>
    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    html, body {
      width: 100%; height: 100%;
      background: #ffffff;

      justify-content: center;

      height: 92vh;
      max-width: 92vmin;

      touch-action: none;

    #ball-mok3 {

    #ball-mok3:active {

<!--

  <!-- ── EH (예) ──────────────────────────────────── -->

  <!-- ── MOK (목) ─── 핵심 인터랙션 ───────────────── -->

    <!-- 목_ㄱ (하단 고정 꺾임) -->
    <line class="s" x1="373.26" y1="592.02" x2="369.25" y2="596.03"/>
    <polygon class="s" points="397.59 570.52 397.59 615.87 369.25 615.87 369.25 596.03 312.56 596.03 312.56 570.52 397.59 570.52"/>

    <!-- 목_ㅁ 눈 점 두 개 -->
    <line class="s" x1="340.91" y1="298.39" x2="340.91" y2="304.06"/>
    <line class="s" x1="369.25" y1="298.39" x2="369.25" y2="304.06"/>

    <rect class="d" x="362.17" y="291.3" width="1.42" height="1.42"/>

    <!-- 목_모: 볼 위치에 반응하는 동적 벽 -->
    <path id="reactive-wall" class="s"
      d="M369.25,321.06v88.16c0,4.18,1.51,8.16,4.01,11.5,5.83,7.79,5.83,19.65,0,27.44-2.5,3.34-4.01,7.33-4.01,11.51v88.16h28.35v22.68h-85.04v-22.68h28.34v-88.2c0-4.16-1.5-8.13-3.99-11.46-5.81-7.76-5.84-19.66-.01-27.45,2.5-3.35,4.01-7.33,4.01-11.5v-88.16h-28.34v-45.35h85.04v45.35h-28.35Z"/>

    <!-- 주황 볼 (드래그 대상) -->
    <rect id="ball-mok3" fill="#f04f2c"
          x="343.74" y="423.11"
          width="22.68" height="22.68"
          rx="11.34" ry="11.34"/>
  </g>
</svg>

<script>
  const svg  = document.getElementById('main-svg');
  const ball = document.getElementById('ball-mok3');
  const wall = document.getElementById('reactive-wall');

  // ── 원본 SVG 수치 (변경 금지) ────────────────────
  const BALL_R      = 11.34;
  const TOP_Y       = 321.06;   // 기둥 시작 Y
  const FOOT_Y      = 547.83;   // 발 시작 Y  (v88.16 직전 끝 지점)
  // 원본에서 bulge 구간: 409.22 ~ 459.67 (총 50.45)
  // 볼 원본 중심 Y = 423.11 + 11.34 = 434.45
  // bulge 절반높이 = 434.45 - 409.22 = 25.23
  const BULGE_HALF  = 25.23;

  // 드래그 가능 범위 (bulge가 기둥 밖으로 나가지 않도록)
  const Y_MIN = TOP_Y  + BULGE_HALF + 4;  // ≈ 350
  const Y_MAX = FOOT_Y - BULGE_HALF - 4;  // ≈ 519

  let ballCY     = 434.45;  // 초기 볼 중심 Y
  let isDragging  = false;
  let hue         = 0;       // 무지개 hue
  let rafId       = null;    // requestAnimationFrame ID

  // ── 원본 bezier 값을 그대로 유지, 직선 구간 길이만 변경 ──
  function buildPath(cy) {
    const bStart = cy - BULGE_HALF;   // bulge 시작 Y
    const bEnd   = cy + BULGE_HALF;   // bulge 끝 Y
    const topSeg = (bStart - TOP_Y).toFixed(3);   // 상단 직선 구간 길이
    const botSeg = (FOOT_Y  - bEnd).toFixed(3);   // 하단 직선 구간 길이

    return [
      `M 369.25,${TOP_Y}`,
      `v ${topSeg}`,
      // 오른쪽 내벽 bulge (원본 bezier 그대로)
      `c 0,4.18,1.51,8.16,4.01,11.5,5.83,7.79,5.83,19.65,0,27.44,-2.5,3.34,-4.01,7.33,-4.01,11.51`,
      `v ${botSeg}`,
      // 하단 발
      `h 28.35 v 22.68 h -85.04 v -22.68 h 28.34`,
      `v -${botSeg}`,
      // 왼쪽 내벽 bulge (원본 bezier 그대로, 방향 반전)
      `c 0,-4.16,-1.5,-8.13,-3.99,-11.46,-5.81,-7.76,-5.84,-19.66,-.01,-27.45,2.5,-3.35,4.01,-7.33,4.01,-11.5`,
      `v -${topSeg}`,
      // 상단 바
      `h -28.34 v -45.35 h 85.04 v 45.35 h -28.35 Z`
    ].join(' ');
  }

  function update(cy) {
    ballCY = Math.max(Y_MIN, Math.min(Y_MAX, cy));
    ball.setAttribute('y', (ballCY - BALL_R).toFixed(3));
    wall.setAttribute('d', buildPath(ballCY));

    // ── 높이에 따른 무지개 색상 (Y_MIN: 빨강 0deg -> Y_MAX: 보라 280deg) ──
    const ratio = (ballCY - Y_MIN) / (Y_MAX - Y_MIN);
    const hue = Math.round(ratio * 280);
    ball.setAttribute('fill', `hsl(${hue}, 100%, 50%)`);
  }

  function svgY(e) {
    const pt = svg.createSVGPoint();
    const src = e.touches ? e.touches[0] : e;
    pt.x = src.clientX;
    pt.y = src.clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse()).y;
  }

  // ── 이벤트 리스너 ────────────────────────────────
  ball.addEventListener('mousedown',  e => { isDragging = true; e.preventDefault(); });
  ball.addEventListener('touchstart', e => { isDragging = true; e.preventDefault(); }, { passive: false });

  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    update(svgY(e));
  });
  window.addEventListener('touchmove', e => {
    if (!isDragging) return;
    e.preventDefault();
    update(svgY(e));
  }, { passive: false });

  window.addEventListener('mouseup',  () => { isDragging = false; });
  window.addEventListener('touchend', () => { isDragging = false; });
</script>

</body>
</html>
