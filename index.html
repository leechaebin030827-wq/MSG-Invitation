<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>DDP 초대장</title>
  <style>
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
    * {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      user-select: none;
    }
    html, body {
      width: 100%; height: 100%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }
    #main-svg {
      width: 100vw;
      height: 100vh;
      display: block;
      touch-action: none;
    }
    #ball-mok3 {
      cursor: grab;
    }
    #ball-mok3:active {
      cursor: grabbing;
    }
    @keyframes bounceUpDown {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }
    @keyframes bounceDown {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(4px); }
    }
    .hint-arrow { transition: opacity 0.4s ease; }
  </style>
</head>

<script>
  const svg  = document.getElementById('main-svg');
  const ball = document.getElementById('ball-mok3');
  const wall = document.getElementById('reactive-wall');

  // ── 원본 SVG 수치 (변경 금지) ────────────────────
  const BALL_R      = 11.34;
  const TOP_Y       = 321.06;
  const FOOT_Y      = 547.83;
  const BULGE_HALF  = 25.23;
  const Y_MIN = TOP_Y  + BULGE_HALF + 4;
  const Y_MAX = FOOT_Y - BULGE_HALF - 4;

  // 팝 사운드 효과음 (pop.mp3 사용)
  const popAudio = new Audio('src/pop.mp3');
  function playPopSound() {
    try {
      const sound = popAudio.cloneNode();
      sound.volume = 0.7;
      sound.play().catch(() => {});
    } catch(e) {}
  }

  // ── 오프닝 검정 실선 드로잉 애니메이션 ──────────────────
  function getElementLength(el) {
    const tag = el.tagName.toLowerCase();
    if (tag === 'line') {
      const x1 = parseFloat(el.getAttribute('x1') || 0);
      const y1 = parseFloat(el.getAttribute('y1') || 0);
      const x2 = parseFloat(el.getAttribute('x2') || 0);
      const y2 = parseFloat(el.getAttribute('y2') || 0);
      return Math.hypot(x2 - x1, y2 - y1);
    }
    if (tag === 'rect') {
      const w = parseFloat(el.getAttribute('width') || 0);
      const h = parseFloat(el.getAttribute('height') || 0);
      return 2 * (w + h);
    }
    if (tag === 'polygon') {
      const pts = (el.getAttribute('points') || '').trim().split(/\s+|,/).map(Number).filter(n => !isNaN(n));
      let len = 0;
      for (let i = 0; i < pts.length - 2; i += 2) {
        len += Math.hypot(pts[i+2] - pts[i], pts[i+3] - pts[i+1]);
      }
      if (pts.length >= 4) {
        len += Math.hypot(pts[0] - pts[pts.length-2], pts[1] - pts[pts.length-1]);
      }
      return len > 0 ? len : 500;
    }
    try {
      if (el.getTotalLength && el.getTotalLength() > 0) return el.getTotalLength();
    } catch(e) {}
    return 600;
  }

  function buildFlatPath() {
    return `M 369.25,${TOP_Y} v 226.77 h 28.35 v 22.68 h -85.04 v -22.68 h 28.34 v -226.77 h -28.34 v -45.35 h 85.04 v 45.35 h -28.35 Z`;
  }

  function runOpeningAnimation() {
    const strokeEls = document.querySelectorAll('#main-svg .s');
    const candyEls  = document.querySelectorAll('#main-svg rect[fill]');
    const eyeEls    = document.querySelectorAll('#main-svg .d');
    const hintUD    = document.getElementById('hint-updown');

    if (hintUD) hintUD.style.opacity = '0';

    // 처음에는 벽이 완전히 평평(직선)하게 설정
    wall.setAttribute('d', buildFlatPath());

    // 1. 모든 검정 실선(.s) 드로잉 준비
    strokeEls.forEach(el => {
      const len = Math.ceil(getElementLength(el));
      el.style.strokeDasharray = `${len} ${len}`;
      el.style.strokeDashoffset = len;
    });

    // 2. 사탕 동그라미들과 눈 점 처음 스케일 0 숨김
    candyEls.forEach(el => {
      const x = parseFloat(el.getAttribute('x') || 0) + parseFloat(el.getAttribute('width') || 0)/2;
      const y = parseFloat(el.getAttribute('y') || 0) + parseFloat(el.getAttribute('height') || 0)/2;
      el.style.transformOrigin = `${x}px ${y}px`;
      el.style.transform = 'scale(0)';
      el.style.opacity = '0';
    });

    eyeEls.forEach(el => {
      el.style.opacity = '0';
    });

    // 3. 선 그리기 애니메이션 시작 (2.4초 동안)
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        strokeEls.forEach(el => {
          el.style.transition = 'stroke-dashoffset 2.4s cubic-bezier(0.25, 1, 0.5, 1)';
          el.style.strokeDashoffset = '0';
        });

        // 4. 선이 거의 완성될 즈음(1.8초) 사탕 동그라미들 순차적으로 톡톡 팝인
        setTimeout(() => {
          candyEls.forEach((el, idx) => {
            setTimeout(() => {
              playPopSound();
              el.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease';
              el.style.opacity = '1';
              el.style.transform = 'scale(1)';

              // 주황 볼(mok3)이 나타날 때 평평했던 벽이 고무처럼 팽창(elastic expand)
              if (el.id === 'ball-mok3') {
                let startTime = null;
                const dur = 700;
                function animateWallExpand(ts) {
                  if (!startTime) startTime = ts;
                  const t = Math.min(1, (ts - startTime) / dur);
                  // 고무 팽창 탄성 스프링 이징 (0 -> 1.25 -> 1.0)
                  const factor = t === 1 ? 1 : 1 - Math.exp(-6 * t) * Math.cos(10 * t);
                  wall.setAttribute('d', buildPathFactor(434.45, factor));
                  if (t < 1) {
                    requestAnimationFrame(animateWallExpand);
                  } else {
                    update(434.45);
                  }
                }
                requestAnimationFrame(animateWallExpand);
              }
            }, idx * 120);
          });

          // 눈 점 나타남
          eyeEls.forEach(el => {
            el.style.transition = 'opacity 0.4s ease';
            el.style.opacity = '1';
          });
        }, 1800);

        // 5. 오프닝 완료 후 스타일 정리 및 힌트 화살표 표시
        setTimeout(() => {
          strokeEls.forEach(el => {
            el.style.strokeDasharray = '';
            el.style.strokeDashoffset = '';
            el.style.transition = '';
          });
          candyEls.forEach(el => {
            el.style.transition = '';
            el.style.transform = '';
            el.style.transformOrigin = '';
          });
          if (hintUD) hintUD.style.opacity = '1';
        }, 3000);
      });
    });
  }

  runOpeningAnimation();

  // 입(mouth) 위치 (SVG 좌표 기준)
  const MOUTH_X = 355.08;  // 입 가로 중앙
  const MOUTH_Y = 301.22;  // 입 세로 중앙

  let ballCY      = 434.45;
  let isDragging   = false;
  let dragAmount   = 0;
  let lastCY       = 434.45;
  let isExploding  = false;
  let pulseAnim    = null;
  const secretTxt  = document.getElementById('secret-text');

  // ── 타이핑 시스템 초기화 ────────────────────────────
  let allChars = [];   // {el, originalDisplay}
  let revealedCount = 0;
  const DRAG_PER_CHAR = 8; // 훨씬 느린 타이핑 (8px 드래그당 1글자)

  function initTyping() {
    const container = secretTxt.querySelector('span');
    if (!container) return;
    const originalHTML = container.innerHTML;
    // HTML을 파싱하여 각 글자를 span으로 감쌈
    const temp = document.createElement('div');
    temp.innerHTML = originalHTML;
    let newHTML = '';

    function wrapChars(node) {
      let result = '';
      node.childNodes.forEach(child => {
        if (child.nodeType === 3) {
          // 텍스트 노드: 글자마다 span으로 감쌈
          for (const ch of child.textContent) {
            if (ch === ' ') {
              result += '<span class="tch" style="display:none;"> </span>';
            } else {
              result += `<span class="tch" style="display:none;">${ch}</span>`;
            }
          }
        } else if (child.nodeType === 1) {
          // 엘리먼트 노드: 스타일 유지하면서 내부 글자 감쌈
          const tag = child.tagName.toLowerCase();
          let attrs = '';
          for (const attr of child.attributes) {
            attrs += ` ${attr.name}="${attr.value}"`;
          }
          result += `<${tag}${attrs}>${wrapChars(child)}</${tag}>`;
        }
      });
      return result;
    }

    container.innerHTML = wrapChars(temp);
    allChars = Array.from(container.querySelectorAll('.tch'));
    revealedCount = 0;
  }

  // 커서 (깜박이는 블록 커서)
  let cursorEl = null;
  function createCursor() {
    cursorEl = document.createElement('span');
    cursorEl.style.cssText = 'display:none;width:0.3em;height:1em;background:#231f20;vertical-align:text-bottom;margin-left:0.5px;';
    cursorEl.className = 'type-cursor';
    // 깜박임 애니메이션은 CSS로
    const style = document.createElement('style');
    style.textContent = `
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      .type-cursor { animation: blink 0.7s step-end infinite; display: inline-block !important; }
    `;
    document.head.appendChild(style);
  }
  createCursor();

  // 타이핑 효과음 (typing.mp3 사용 - 드래그 이동 시에만 싱글 오디오 재생)
  const typeAudio = new Audio('src/typing.mp3');
  typeAudio.volume = 0.6;
  typeAudio.playbackRate = 1.5;
  let audioStopTimer = null;

  function playTypeClick() {
    if (revealedCount >= allChars.length) {
      typeAudio.pause();
      return;
    }
    try {
      if (typeAudio.paused) {
        typeAudio.play().catch(() => {});
      }
      clearTimeout(audioStopTimer);
      audioStopTimer = setTimeout(() => {
        typeAudio.pause();
      }, 120);
    } catch(e) {}
  }

  // 햅틱 진동 효과 (Android 모바일 지원)
  function triggerHaptic(duration = 15) {
    if (typeof navigator !== 'undefined' && 'vibrate' in navigator) {
      try {
        navigator.vibrate(duration);
      } catch(e) {}
    }
  }

  function revealChars(count) {
    const target = Math.min(count, allChars.length);
    let newChars = false;
    for (let i = revealedCount; i < target; i++) {
      allChars[i].style.display = 'inline';
      newChars = true;
    }
    if (newChars && target > revealedCount) {
      playTypeClick();
      triggerHaptic();
    }
    revealedCount = target;

    // 커서 위치 업데이트
    if (revealedCount > 0 && revealedCount < allChars.length) {
      allChars[revealedCount - 1].after(cursorEl);
      cursorEl.style.display = 'inline-block';
    }
    // 타이핑 100% 완료 시 힌트 화살표 전환
    if (revealedCount >= allChars.length) {
      const hintUD = document.getElementById('hint-updown');
      const hintD  = document.getElementById('hint-down');
      if (hintUD) hintUD.style.opacity = '0';
      if (hintD)  hintD.style.opacity = '1';
    }
  }

  // 페이지 로드 시 초기화
  initTyping();

  // ── Web Audio API ────────────────────────────────
  let audioCtx = null;
  let activeOsc = [];
  let gainNode = null;

  function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = audioCtx.createGain();
    gainNode.gain.value = 0;
    gainNode.connect(audioCtx.destination);
  }

  function startSound() {
    if (!audioCtx) return;
    stopSound();
    // 메인 톤 + 서브 톤
    const freqs = [220, 330, 440];
    freqs.forEach(f => {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = f;
      osc.connect(gainNode);
      osc.start();
      activeOsc.push(osc);
    });
    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
  }

  function updateSound(ratio) {
    if (!audioCtx || !gainNode || activeOsc.length === 0) return;
    // ratio: 0(위) ~ 1(아래, 보라)
    // 볼륨: 0 → 0.3
    gainNode.gain.setTargetAtTime(ratio * 0.3, audioCtx.currentTime, 0.05);
    // 주파수 올리기: 아래로 갈수록 높은 피치 + detuning
    activeOsc.forEach((osc, i) => {
      const baseFreq = [220, 330, 440][i];
      osc.frequency.setTargetAtTime(
        baseFreq + ratio * 400 + Math.sin(Date.now() * 0.01 * (i + 1)) * ratio * 50,
        audioCtx.currentTime, 0.05
      );
      osc.type = ratio > 0.7 ? 'sawtooth' : ratio > 0.4 ? 'triangle' : 'sine';
    });
  }

  function stopSound() {
    activeOsc.forEach(o => { try { o.stop(); } catch(e){} });
    activeOsc = [];
    if (gainNode) gainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.02);
  }

  // ── 폭발 사운드 ──────────────────────────────────
  function playExplosionSound() {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.8);
    g.gain.setValueAtTime(0.5, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.2);
    osc.connect(g);
    g.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 1.2);

    // 노이즈 버스트
    const bufSize = audioCtx.sampleRate * 0.5;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
    const noise = audioCtx.createBufferSource();
    const ng = audioCtx.createGain();
    noise.buffer = buf;
    ng.gain.setValueAtTime(0.4, audioCtx.currentTime);
    ng.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
    noise.connect(ng);
    ng.connect(audioCtx.destination);
    noise.start();
  }

  // ── 경로 빌드 ────────────────────────────────────
  function buildPathFactor(cy, factor = 1) {
    if (factor <= 0) return buildFlatPath();
    const bHalf = BULGE_HALF * factor;
    const bStart = cy - bHalf;
    const bEnd   = cy + bHalf;
    const topSeg = (bStart - TOP_Y).toFixed(3);
    const botSeg = (FOOT_Y  - bEnd).toFixed(3);
    const r1 = (4.01 * factor).toFixed(3);
    const r3 = (5.83 * factor).toFixed(3);

    return [
      `M 369.25,${TOP_Y}`,
      `v ${topSeg}`,
      `c 0,${(4.18*factor).toFixed(3)},${(1.51*factor).toFixed(3)},${(8.16*factor).toFixed(3)},${r1},${(11.5*factor).toFixed(3)},${r3},${(7.79*factor).toFixed(3)},${r3},${(19.65*factor).toFixed(3)},0,${(27.44*factor).toFixed(3)},-${(2.5*factor).toFixed(3)},${(3.34*factor).toFixed(3)},-${r1},${(7.33*factor).toFixed(3)},-${r1},${(11.51*factor).toFixed(3)}`,
      `v ${botSeg}`,
      `h 28.35 v 22.68 h -85.04 v -22.68 h 28.34`,
      `v -${botSeg}`,
      `c 0,-${(4.16*factor).toFixed(3)},-${(1.5*factor).toFixed(3)},-${(8.13*factor).toFixed(3)},-${(3.99*factor).toFixed(3)},-${(11.46*factor).toFixed(3)},-${(5.81*factor).toFixed(3)},-${(7.76*factor).toFixed(3)},-${r3},-${(19.66*factor).toFixed(3)},-.01,-${(27.45*factor).toFixed(3)},${(2.5*factor).toFixed(3)},-${(3.35*factor).toFixed(3)},${r1},-${(7.33*factor).toFixed(3)},${r1},-${(11.5*factor).toFixed(3)}`,
      `v -${topSeg}`,
      `h -28.34 v -45.35 h 85.04 v 45.35 h -28.35 Z`
    ].join(' ');
  }

  function buildPath(cy) {
    return buildPathFactor(cy, 1);
  }

  // ── 보라존 펄스 애니메이션 ─────────────────────────
  const PURPLE_ZONE = 0.85; // ratio > 0.85 = 보라 구간
  let pulsePhase = 0;

  function pulseBall() {
    if (!isDragging || isExploding) { cancelPulse(); return; }
    // 텍스트가 100% 타이핑 완료된 상태에서만 펄스 작동
    if (revealedCount < allChars.length) { cancelPulse(); return; }

    const ratio = (ballCY - Y_MIN) / (Y_MAX - Y_MIN);
    if (ratio < PURPLE_ZONE) { cancelPulse(); return; }

    pulsePhase += 0.15;
    const scale = 1 + 0.15 * Math.sin(pulsePhase);
    const cx = 343.74 + 11.34;
    const cy = ballCY;
    ball.setAttribute('transform', `translate(${cx}, ${cy}) scale(${scale}) translate(${-cx}, ${-cy})`);
    pulseAnim = requestAnimationFrame(pulseBall);
  }

  function cancelPulse() {
    if (pulseAnim) { cancelAnimationFrame(pulseAnim); pulseAnim = null; }
    ball.removeAttribute('transform');
    pulsePhase = 0;
  }

  // ── 업데이트 ──────────────────────────────────────
  function update(cy) {
    if (isExploding) return;
    ballCY = Math.max(Y_MIN, Math.min(Y_MAX, cy));
    ball.setAttribute('y', (ballCY - BALL_R).toFixed(3));
    wall.setAttribute('d', buildPath(ballCY));

    // 화살표 위치를 공 이동(ballCY)에 따라 실시간 추종
    const deltaY = ballCY - 434.45;
    const hintUD = document.getElementById('hint-updown');
    const hintD  = document.getElementById('hint-down');
    if (hintUD) hintUD.setAttribute('transform', `translate(0, ${deltaY})`);
    if (hintD)  hintD.setAttribute('transform', `translate(0, ${deltaY})`);

    const ratio = (ballCY - Y_MIN) / (Y_MAX - Y_MIN);
    const hue = Math.round(ratio * 280);
    ball.setAttribute('fill', `hsl(${hue}, 100%, 50%)`);

    // 타이핑 텍스트 나타남 (드래그 누적 거리 기반)
    if (isDragging) {
      dragAmount += Math.abs(ballCY - lastCY);
      const charsToShow = Math.floor(dragAmount / DRAG_PER_CHAR);
      if (charsToShow > revealedCount) {
        revealChars(charsToShow);
      }

    // 텍스트 100% 완성 시: 첫 번째 화살표(hintUD) 무조건 강제 숨김 + 하단 화살표(hintD) 표시
    if (revealedCount >= allChars.length) {
      if (hintUD) hintUD.style.opacity = '0';
      if (hintD)  hintD.style.opacity = '1';
    } else {
      if (hintD)  hintD.style.opacity = '0';
    }
    }
    lastCY = ballCY;

    // 보라 구간 펄스 시작/종료 (텍스트 100% 완성 시에만)
    if (ratio >= PURPLE_ZONE && !pulseAnim && isDragging && revealedCount >= allChars.length) {
      pulseBall();
    } else if (ratio < PURPLE_ZONE || revealedCount < allChars.length) {
      cancelPulse();
    }
  }

  // ── 폭발 시퀀스 (다이내믹 버전) ────────────────────
  const canvas = document.getElementById('explosion-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth * devicePixelRatio;
    canvas.height = window.innerHeight * devicePixelRatio;
    ctx.scale(devicePixelRatio, devicePixelRatio);
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  // SVG 좌표 → 화면 좌표 변환
  function svgToScreen(sx, sy) {
    const pt = svg.createSVGPoint();
    pt.x = sx; pt.y = sy;
    const ctm = svg.getScreenCTM();
    const sp = pt.matrixTransform(ctm);
    return { x: sp.x, y: sp.y };
  }

  // 파티클 클래스
  class Particle {
    constructor(x, y, hue) {
      this.x = x; this.y = y;
      const angle = Math.random() * Math.PI * 2;
      const speed = 3 + Math.random() * 12;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;
      this.life = 1;
      this.decay = 0.008 + Math.random() * 0.015;
      this.size = 6 + Math.random() * 14;
      this.gravity = 0.05 + Math.random() * 0.1;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      this.vy += this.gravity;
      this.vx *= 0.99;
      this.life -= this.decay;
    }
    draw(ctx) {
      ctx.globalAlpha = 1;
      ctx.fillStyle = `hsl(280, 100%, 50%)`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function triggerExplosion() {
    isExploding = true;
    cancelPulse();
    stopSound();

    const ballCX = 343.74 + 11.34;
    const startY = ballCY;
    const endY   = MOUTH_Y;

    // ── 1단계: 에너지 압축 (공이 잠깐 쪼그라들며 떨림) ──
    let compressStart = null;
    const compressDur = 300;

    function compress(ts) {
      if (!compressStart) compressStart = ts;
      const t = Math.min(1, (ts - compressStart) / compressDur);

      // 떨림 + 수축
      const shake = Math.sin(t * 30) * (1 - t) * 3;
      const squish = 1 - t * 0.3;
      const cx = ballCX + shake;
      const cy = ballCY;
      ball.setAttribute('transform',
        `translate(${cx}, ${cy}) scale(${squish * 0.8}, ${squish * 1.2}) translate(${-cx}, ${-cy})`);

      // 화면 미세 떨림
      document.body.style.transform = `translate(${shake}px, ${Math.sin(t*40)*2}px)`;

      if (t < 1) {
        requestAnimationFrame(compress);
      } else {
        document.body.style.transform = '';
        shootUpPhase();
      }
    }
    requestAnimationFrame(compress);

  // 쏘아 올라갈 때 사운드 (out.mp3 사용)
  const outAudio = new Audio('src/out.mp3');
  function playOutSound() {
    try {
      outAudio.currentTime = 0;
      outAudio.volume = 0.9;
      outAudio.play().catch(() => {});
    } catch(e) {}
  }

  // ── 2단계: 쏘아 올라감 (카메라 클로즈업 줌인 + 트래킹 모션) ──
  function shootUpPhase() {
    playOutSound();
    let shootStart = null;
    const shootDur = 450; // 약간 더 여유있고 다이내믹하게 (450ms)

    function shootUp(ts) {
      if (!shootStart) shootStart = ts;
      const t = Math.min(1, (ts - shootStart) / shootDur);
      // easeOutExpo (매우 빠르게 출발)
      const ease = 1 - Math.pow(2, -12 * t);
      const cy = startY + (endY - startY) * ease;

      ball.setAttribute('y', (cy - BALL_R).toFixed(3));
      wall.setAttribute('d', buildPath(Math.max(Y_MIN, Math.min(Y_MAX, cy))));

      // 스트레칭: 처음에 세로로 길쭉 → 점점 원형 → 커짐
      const stretchY = 1 + (1 - t) * 0.9;  // 1.9 → 1
      const stretchX = 1 - (1 - t) * 0.35; // 0.65 → 1
      const growScale = 1 + t * 2.2;
      ball.setAttribute('transform',
        `translate(${ballCX}, ${cy}) scale(${stretchX * growScale}, ${stretchY * growScale}) translate(${-ballCX}, ${-cy})`);

      // 카메라 포커스 줌인 & 날아가는 공 위치 실시간 클로즈업 트래킹
      const zoom = 1 + t * 1.8; // 1x → 2.8x 줌인
      const ballPos = svgToScreen(ballCX, cy);
      const shakeAmt = (1 - t) * 5;
      const shakeX = Math.sin(t * 60) * shakeAmt;
      const shakeY = Math.cos(t * 50) * shakeAmt;

      document.body.style.transformOrigin = `${ballPos.x}px ${ballPos.y}px`;
      document.body.style.transform = `scale(${zoom}) translate(${shakeX}px, ${shakeY}px)`;

      // 공 뒤로 잔상 트레일 (파티클로)
      if (t < 0.8) {
        for (let i = 0; i < 3; i++) {
          particles.push(new Particle(ballPos.x, ballPos.y, 280));
        }
      }

      if (t < 1) {
        requestAnimationFrame(shootUp);
      } else {
        document.body.style.transform = '';
        document.body.style.transformOrigin = '';
        explodeFromMouth();
      }
    }
    requestAnimationFrame(shootUp);
  }

    // ── 3단계: 입에서 폭발 ──
    function explodeFromMouth() {
      const mouthScreen = svgToScreen(MOUTH_X, MOUTH_Y);

      // 대량 파티클 폭발
      for (let i = 0; i < 120; i++) {
        const p = new Particle(mouthScreen.x, mouthScreen.y, 280);
        p.vx *= 2.5;
        p.vy *= 2.5;
        p.size *= 1.5;
        p.decay *= 0.5;
        particles.push(p);
      }

      // 보라색 원 확장 시작
      let expandStart = null;
      const maxRadius = Math.hypot(window.innerWidth, window.innerHeight);

      function expandCircle(ts) {
        if (!expandStart) expandStart = ts;
        const t = Math.min(1, (ts - expandStart) / 1200);
        // easeOutQuart
        const ease = 1 - Math.pow(1 - t, 4);
        const radius = ease * maxRadius;

        // 캔버스 그리기
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

        // 보라색 원 확장
        ctx.globalAlpha = 1;
        ctx.fillStyle = `hsl(280, 100%, 50%)`;
        ctx.beginPath();
        ctx.arc(mouthScreen.x, mouthScreen.y, radius, 0, Math.PI * 2);
        ctx.fill();

        // 파티클 업데이트 & 드로우
        particles = particles.filter(p => p.life > 0);
        particles.forEach(p => { p.update(); p.draw(ctx); });

        // SVG 페이드아웃 (원이 커지면서)
        svg.style.opacity = Math.max(0, 1 - t * 2);

        // 화면 흔들림 (초반만)
        if (t < 0.3) {
          const shake = (1 - t / 0.3) * 6;
          document.body.style.transform =
            `translate(${Math.sin(t*80) * shake}px, ${Math.cos(t*60) * shake}px)`;
        } else {
          document.body.style.transform = '';
        }

        if (t >= 0.8) {
          startFinalTyping();
        }

        if (t < 1 || particles.length > 0) {
          requestAnimationFrame(expandCircle);
        }
      }
      requestAnimationFrame(expandCircle);
    }
  }

  // ── 최종 보라색 화면 타이핑 시스템 (컬러 하이라이트 디자인 적용) ─────────────────────────
  const FINAL_MAIN_HTML = `<span style="color:#e60012">오래</span> 준비한 <span style="color:#e60012">이야기</span>들을 드디어 <span style="background:#8cc63f;color:#000;padding:0.2px 2px;">DDP</span>에 <span style="background:#fff100;color:#000;padding:0.2px 2px;">꺼내놓습니다.</span> 이제 <span style="color:#8cc63f">정말</span> 끝이라고 <span style="color:#00a1e9">생각</span>했습니다. <span style="color:#8cc63f">그런데</span> 보여드리고 싶은 건 <span style="background:#66c0f4;color:#000;padding:0.2px 2px;">아직</span> 많더라고요. 그래서 <span style="background:#e4007f;color:#fff;padding:0.2px 2px;">준비했습니다.</span> 한 번쯤 꼭 <span style="background:#f37021;color:#fff;padding:0.2px 2px;">보러</span> 와주세요...<br/><br/><span style="color:#e60012">홍익대학교</span> 디자인컨버전스학부 <span style="background:#fff100;color:#e4007f;padding:0.2px 2px;">졸업전시</span><br/><span style="background:#8cc63f;color:#000;padding:0.2px 2px;">2026. 00. 00–00. 00</span> / 10:00–19:00 <span style="background:#66c0f4;color:#000;padding:0.2px 2px;">DDP 디자인랩 1층 D-숲</span>`;

  const FINAL_MEMBERS_HTML = `<div style="font-weight:800;margin-bottom:8px;color:#fff100;font-size:clamp(15px, 4.2vw, 19px);">참여자</div><div style="font-size:clamp(13px, 3.6vw, 15.5px);line-height:1.8;color:rgba(255,255,255,0.95);font-weight:600;">강예은 · 김서윤 · 김예준 · 김주희 · 김창래 · 김희서 · 모소연 · 박시형 · 박정연 · 박지혜 · 손예림 · 양서경 · 왕은빈 · 이채빈 · 장지혁 · 정규태 · 조유정 · 진아름 · 황예은</div>`;

  let finalChars = [];
  let isFinalTypingStarted = false;

  function wrapFinalNodes(node) {
    let result = '';
    node.childNodes.forEach(child => {
      if (child.nodeType === 3) {
        for (const ch of child.textContent) {
          if (ch === ' ') {
            result += '<span class="fch" style="display:none;"> </span>';
          } else {
            result += `<span class="fch" style="display:none;">${ch}</span>`;
          }
        }
      } else if (child.nodeType === 1) {
        const tag = child.tagName.toLowerCase();
        if (tag === 'br') {
          result += '<br/>';
        } else {
          let attrs = '';
          for (const attr of child.attributes) {
            attrs += ` ${attr.name}="${attr.value}"`;
          }
          result += `<${tag}${attrs}>${wrapFinalNodes(child)}</${tag}>`;
        }
      }
    });
    return result;
  }

  function initFinalText() {
    const mainEl = document.getElementById('final-main-text');
    const membEl = document.getElementById('final-members-text');
    if (!mainEl || !membEl) return;

    const tempMain = document.createElement('div');
    tempMain.innerHTML = FINAL_MAIN_HTML;
    mainEl.innerHTML = wrapFinalNodes(tempMain);

    const tempMemb = document.createElement('div');
    tempMemb.innerHTML = FINAL_MEMBERS_HTML;
    membEl.innerHTML = wrapFinalNodes(tempMemb);

    finalChars = Array.from(document.querySelectorAll('.fch'));
  }

  function startFinalTyping() {
    if (isFinalTypingStarted) return;
    isFinalTypingStarted = true;

    const finalScreen = document.getElementById('final-screen');
    finalScreen.style.display = 'flex';
    requestAnimationFrame(() => {
      finalScreen.style.opacity = '1';
    });

    // typing.mp3 음원 재생 시작
    try {
      typeAudio.currentTime = 0;
      typeAudio.loop = true;
      typeAudio.play().catch(() => {});
    } catch(e) {}

    let fIdx = 0;
    const finalTimer = setInterval(() => {
      if (fIdx < finalChars.length) {
        finalChars[fIdx].style.display = 'inline';
        triggerHaptic();
        fIdx++;
      } else {
        clearInterval(finalTimer);
        typeAudio.pause();
        typeAudio.loop = false;
      }
    }, 38);
  }

  initFinalText();

  function svgY(e) {
    const pt = svg.createSVGPoint();
    const src = e.touches ? e.touches[0] : e;
    pt.x = src.clientX;
    pt.y = src.clientY;
    return pt.matrixTransform(svg.getScreenCTM().inverse()).y;
  }

  // ── 이벤트 리스너 ────────────────────────────────
  function onStart(e) {
    if (isExploding) return;
    initAudio();
    isDragging = true;
    e.preventDefault();
  }

  function onMove(e) {
    if (!isDragging || isExploding) return;
    if (e.cancelable) e.preventDefault();
    update(svgY(e));
  }

  function onEnd() {
    if (!isDragging || isExploding) return;
    isDragging = false;
    typeAudio.pause();

    const ratio = (ballCY - Y_MIN) / (Y_MAX - Y_MIN);

    // 텍스트가 100% 다 나타난 상태에서만 보라 구간 손 뗌 시 폭발!
    if (ratio >= PURPLE_ZONE && revealedCount >= allChars.length) {
      triggerExplosion();
    } else {
      cancelPulse();
    }
  }

  ball.addEventListener('mousedown', onStart);
  ball.addEventListener('touchstart', onStart, { passive: false });
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('mouseup', onEnd);
  window.addEventListener('touchend', onEnd);
</script>

</body>
</html>
